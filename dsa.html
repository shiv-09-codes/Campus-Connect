<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA | Student Hub</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="dsa.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="polish.css">
</head>
<body>

  <div id="navbarContainer"></div>

  <main>
    <section class="dsa-header">
      <h2>DSA Tracker</h2>
      <p>Log problems you solve and build your streak</p>
    </section>

    <section class="streak-summary">
      <div class="streak-card">
        <h3 id="totalSolved">0</h3>
        <p>Total Solved</p>
      </div>
      <div class="streak-card">
        <h3 id="currentStreak">0</h3>
        <p>Day Streak</p>
      </div>
    </section>

    <section class="add-form">
      <input type="text" id="problemInput" placeholder="Problem name (e.g. Two Sum)...">
      <select id="difficultyInput">
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
      <button id="addBtn">Log Solved</button>
    </section>

    <section class="dsa-list" id="dsaList"></section>
  </main>

  <div id="footerContainer"></div>

  <script src="navbar.js"></script>
  <script src="footer.js"></script>
  <script src="dsa.js"></script>
</body>
</html>
