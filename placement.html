<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement | Student Hub</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="placement.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="polish.css">
</head>
<body>

  <div id="navbarContainer"></div>

  <main>
    <section class="placement-header">
      <h2>Placement Prep</h2>
      <p>Track your readiness across resume, skills, and interviews</p>
    </section>

    <section class="progress-section">
      <h3>Overall Readiness</h3>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p id="progressText">0% ready</p>
    </section>

    <section class="checklist-section">
      <h3>Checklist</h3>
      <div class="checklist" id="checklist"></div>
    </section>

    <section class="resources-section">
      <h3>Quick Resources</h3>
      <div class="resources">
        <a href="https://leetcode.com" target="_blank" class="resource-card">LeetCode</a>
        <a href="https://www.geeksforgeeks.org" target="_blank" class="resource-card">GeeksforGeeks</a>
        <a href="https://www.linkedin.com" target="_blank" class="resource-card">LinkedIn</a>
        <a href="https://www.glassdoor.com" target="_blank" class="resource-card">Glassdoor</a>
      </div>
    </section>
  </main>

  <div id="footerContainer"></div>

  <script src="navbar.js"></script>
  <script src="footer.js"></script>
  <script src="placement.js"></script>
</body>
</html>
