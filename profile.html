<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Student Hub</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="polish.css">
</head>
<body>

  <div id="navbarContainer"></div>

  <main>
    <section class="profile-header">
      <h2>My Profile</h2>
      <p>Manage your personal information</p>
    </section>

    <section class="profile-card" id="profileView">
      <div class="avatar" id="avatarInitial">S</div>
      <h3 id="viewName">Your Name</h3>
      <p id="viewBranch">Branch • Year</p>
      <p id="viewEmail">email@example.com</p>
      <p class="bio" id="viewBio">No bio added yet.</p>
      <button id="editBtn">Edit Profile</button>
    </section>

    <section class="profile-form" id="profileForm" hidden>
      <label for="nameInput">Full Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Shiv Sharma">

      <label for="branchInput">Branch</label>
      <input type="text" id="branchInput" placeholder="e.g. Computer Engineering">

      <label for="yearInput">Year</label>
      <select id="yearInput">
        <option value="1st Year">1st Year</option>
        <option value="2nd Year">2nd Year</option>
        <option value="3rd Year">3rd Year</option>
        <option value="4th Year">4th Year</option>
      </select>

      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" placeholder="e.g. shiv@example.com">

      <label for="bioInput">Bio</label>
      <textarea id="bioInput" rows="3" placeholder="A short line about yourself..."></textarea>

      <div class="form-actions">
        <button id="saveBtn">Save</button>
        <button id="cancelBtn" type="button">Cancel</button>
      </div>
    </section>
  </main>

  <div id="footerContainer"></div>

  <script src="navbar.js"></script>
  <script src="footer.js"></script>
  <script src="profile.js"></script>
</body>
</html>
