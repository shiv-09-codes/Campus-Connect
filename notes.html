<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes | Student Hub</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="notes.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="polish.css">
</head>
<body>

  <div id="navbarContainer"></div>

  <main>
    <section class="notes-header">
      <h2>Notes</h2>
      <p>Save and organize notes by subject</p>
    </section>

    <section class="add-form">
      <input type="text" id="subjectInput" placeholder="Subject (e.g. DSA, Python)...">
      <textarea id="noteInput" placeholder="Write your note here..." rows="3"></textarea>
      <button id="addBtn">Save Note</button>
    </section>

    <section class="filter-bar">
      <label for="subjectFilter">Filter by subject:</label>
      <select id="subjectFilter">
        <option value="all">All</option>
      </select>
    </section>

    <section class="notes-list" id="notesList"></section>
  </main>

  <div id="footerContainer"></div>

  <script src="navbar.js"></script>
  <script src="footer.js"></script>
  <script src="notes.js"></script>
</body>
</html>
