<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments | Student Hub</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="assignment.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="stylesheet" href="polish.css">
</head>
<body>

  <div id="navbarContainer"></div>

  <main>
    <section class="assignment-header">
      <h2>Assignments</h2>
      <p>Track and manage your pending work</p>
    </section>

    <section class="add-form">
      <input type="text" id="assignmentInput" placeholder="Enter assignment name...">
      <input type="date" id="dueDateInput">
      <button id="addBtn">Add</button>
    </section>

    <section class="assignment-list" id="assignmentList"></section>
  </main>

  <div id="footerContainer"></div>

  <script src="navbar.js"></script>
  <script src="footer.js"></script>
  <script src="assignment.js"></script>
</body>
</html>
